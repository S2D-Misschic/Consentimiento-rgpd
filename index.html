<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consentimiento RGPD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; }
        input, textarea { padding: 8px; margin: 5px 0; width: 300px; }
        button { padding: 10px 20px; margin: 10px 5px 10px 0; cursor: pointer; }
        .primary { background: #1F4A1F; color: white; }
        canvas { border: 2px solid black; display: block; margin: 20px 0; width: 500px; height: 150px; background: white; }
    </style>
</head>
<body>

<h1>Generador Consentimiento RGPD</h1>

<h2>Paso 1: Datos</h2>
<label>Nombre: <input type="text" id="nombre" value=""></label><br>
<label>CIF: <input type="text" id="cif" value=""></label><br>
<label>Email: <input type="text" id="email" value=""></label><br>
<label>Móvil: <input type="text" id="movil" value=""></label><br>

<h2>Paso 2: Empresas</h2>
<label><input type="checkbox" id="misschic" checked> Misschic S.L. (ES-B93148070)</label><br>
<label><input type="checkbox" id="s2d" checked> S2D Global Motors (ES-B56974967)</label><br>

<h2>Paso 3: Aceptación y Firma</h2>
<label><input type="checkbox" id="acepto"> Acepto la política RGPD</label><br>

<p><strong>Dibuja tu firma:</strong></p>
<canvas id="canvas"></canvas>
<button onclick="limpiar()">Limpiar</button>

<h2>Descargar</h2>
<button class="primary" onclick="descargar()">DESCARGAR PDF</button>

<script>
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    let drawing = false;

    canvas.width = 500;
    canvas.height = 150;

    canvas.addEventListener('mousedown', (e) => {
        drawing = true;
        let rect = canvas.getBoundingClientRect();
        ctx.beginPath();
        ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!drawing) return;
        let rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
    });

    canvas.addEventListener('mouseup', () => { drawing = false; });
    canvas.addEventListener('mouseout', () => { drawing = false; });

    function limpiar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function descargar() {
        if (!document.getElementById('acepto').checked) {
            alert('Debes aceptar');
            return;
        }

        let nombre = document.getElementById('nombre').value;
        let cif = document.getElementById('cif').value;
        let email = document.getElementById('email').value;
        let movil = document.getElementById('movil').value;
        let firma = canvas.toDataURL();

        if (document.getElementById('misschic').checked) {
            generarPDF('Misschic S.L.', 'ES-B93148070', nombre, cif, email, movil, firma);
        }
        if (document.getElementById('s2d').checked) {
            setTimeout(() => {
                generarPDF('S2D Global Motors', 'ES-B56974967', nombre, cif, email, movil, firma);
            }, 1000);
        }
    }

    function generarPDF(empresa, cifEmp, nombre, cif, email, movil, firma) {
        let fecha = new Date().toLocaleDateString('es-ES');
        let html = '';
        html += '<h1 style="text-align:center; color:#1F4A1F">CONSENTIMIENTO RGPD/LOPDGDD</h1>';
        html += '<p><b>' + empresa + '</b>, como Responsable del tratamiento, informa que los datos se tratarán conforme al RGPD.</p>';
        html += '<h2 style="color:#1F4A1F">DATOS DEL CLIENTE</h2>';
        html += '<p>Nombre: ' + nombre + '<br>CIF: ' + cif + '<br>Email: ' + email + '<br>Móvil: ' + movil + '</p>';
        html += '<h2 style="color:#1F4A1F">DERECHOS</h2>';
        html += '<p>Derecho a retirar consentimiento, acceso, supresión, rectificación y reclamación ante AEPD.</p>';
        html += '<h2 style="color:#1F4A1F">FIRMA</h2>';
        html += '<img src="' + firma + '" style="max-width:300px; height:auto; border:2px solid black; margin:20px 0;">';
        html += '<p>Fecha: ' + fecha + '</p>';
        html += '<p style="font-size:9px">Documento válido para auditoría RGPD. Empresa: ' + empresa + ' (' + cifEmp + ')</p>';

        let opt = {
            margin: 10,
            filename: 'CONSENTIMIENTO_' + cif.replace(/\//g, '_') + '_' + fecha.replace(/\//g, '') + '_' + empresa.replace(/\s/g, '_') + '.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
        };

        html2pdf().set(opt).from(html, 'string').save();
    }
</script>

</body>
</html>
