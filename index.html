<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consentimiento RGPD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 40px auto; padding: 20px; }
        h1 { color: #1F4A1F; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0 20px 0; font-family: Arial; }
        .checkbox { margin: 20px 0; }
        button { padding: 12px 24px; background: #1F4A1F; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #163d16; }
        .section { margin: 30px 0; }
    </style>
</head>
<body>

<h1>Generador Consentimiento RGPD</h1>

<div class="section">
    <h2>Datos del Cliente</h2>
    <input type="text" id="nombre" placeholder="Nombre Fiscal">
    <input type="text" id="cif" placeholder="CIF">
    <input type="email" id="email" placeholder="Email">
    <input type="tel" id="movil" placeholder="Móvil">
</div>

<div class="section">
    <h2>Seleccionar Empresa(s)</h2>
    <label><input type="checkbox" id="misschic" checked> Misschic S.L. (ES-B93148070)</label><br>
    <label><input type="checkbox" id="s2d" checked> S2D Global Motors (ES-B56974967)</label>
</div>

<div class="section checkbox">
    <label><input type="checkbox" id="acepto"> He leído y acepto la política RGPD</label>
</div>

<button onclick="generar()">DESCARGAR PDF</button>

<script>
function generar() {
    if (!document.getElementById('acepto').checked) {
        alert('Debes aceptar la política');
        return;
    }

    let nombre = document.getElementById('nombre').value || 'Sin especificar';
    let cif = document.getElementById('cif').value || 'Sin especificar';
    let email = document.getElementById('email').value || 'Sin especificar';
    let movil = document.getElementById('movil').value || 'Sin especificar';
    let misschic = document.getElementById('misschic').checked;
    let s2d = document.getElementById('s2d').checked;
    let fecha = new Date().toLocaleDateString('es-ES');

    if (misschic) {
        descargarPDF('Misschic S.L.', 'ES-B93148070', nombre, cif, email, movil, fecha);
    }
    if (s2d) {
        setTimeout(() => {
            descargarPDF('S2D Global Motors', 'ES-B56974967', nombre, cif, email, movil, fecha);
        }, 1000);
    }
}

function descargarPDF(empresa, cifEmp, nombre, cif, email, movil, fecha) {
    let html = `
        <h1 style="text-align:center; color:#1F4A1F">CONSENTIMIENTO RGPD/LOPDGDD</h1>
        <p><b>${empresa}</b>, como Responsable del tratamiento, informa que los datos se tratarán conforme al RGPD.</p>

        <h2 style="color:#1F4A1F">DATOS DEL CLIENTE</h2>
        <p>Nombre: ${nombre}<br>CIF: ${cif}<br>Email: ${email}<br>Móvil: ${movil}</p>

        <h2 style="color:#1F4A1F">FINES Y LEGITIMACIÓN</h2>
        <p>Mantener relación profesional incluyendo documentos comerciales, tramitación aduanal y comunicaciones comerciales.</p>

        <h2 style="color:#1F4A1F">DERECHOS DEL INTERESADO</h2>
        <p>Derecho a retirar consentimiento, acceso, supresión, rectificación y reclamación ante AEPD (www.aepd.es).</p>

        <h2 style="color:#1F4A1F">CONSENTIMIENTO</h2>
        <p>El Interesado consiente el tratamiento de sus datos en los términos expuestos y acepta comunicaciones vía WhatsApp, SMS, email, etc.</p>

        <p style="margin-top:40px; font-size:10px; border-top:1px solid #ddd; padding-top:20px">
            Fecha: ${fecha}<br>
            Empresa: ${empresa} (${cifEmp})<br>
            Documento válido para auditoría RGPD/LOPDGDD
        </p>
    `;

    let opt = {
        margin: 10,
        filename: 'CONSENTIMIENTO_' + cif.replace(/\//g,'_') + '_' + fecha.replace(/\//g,'') + '_' + empresa.replace(/\s/g,'_') + '.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
    };

    html2pdf().set(opt).from(html, 'string').save();
}
</script>

</body>
</html>
